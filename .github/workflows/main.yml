name: Docker Build and Push
on:
  push:
    tags:
      - "v*"

concurrency:
  group: docker-build-push
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 署名(Cosign)のセットアップ
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # マルチプラットフォーム対応が必要な場合はこれを使用
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub へのログイン
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # イメージ名とタグの定義
      - name: Add metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Organizationの環境変数からユーザー名を取得してイメージ名を構成
          images: ${{ secrets.DOCKERHUB_USERNAME }}/rielu-site
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      # ビルドとプッシュ
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Docker Hub上のレジストリキャッシュを利用
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rielu-site:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rielu-site:buildcache,mode=max

      # Cosignによる署名 (GitHub OIDC Keyless署名)
      - name: Sign Docker images
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
