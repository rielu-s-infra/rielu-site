apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: rielu-site
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: "rielu-site"
      images:
        - alias: "rielu-site"
          imageName: "ghcr.io/penti-nameko/rielu-site"
          commonUpdateSettings:
            updateStrategy: "semver"
