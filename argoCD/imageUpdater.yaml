apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rielu-site
  namespace: argocd
  annotations:
    # Image Updaterの設定（注釈として記述）
    argocd-image-updater.argoproj.io/image-list: rielu-site=docker.io/rieluinfra/rielu-site
    argocd-image-updater.argoproj.io/rielu-site.update-strategy: semver
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: 'https://github.com/あなたのユーザー名/リポジトリ名.git' # ←ここを書き換え
    targetRevision: HEAD
    path: 'マニフェストがあるディレクトリ' # ←ここを書き換え
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rielu-site # ←デプロイ先のNamespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
